[phases.setup]
nixPkgs = ["...", "chromium", "libasound2"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium",
    "apt-get update",
    "apt-get install -y libasound2t64 libgbm1 libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2"
]

[start]
cmd = "python app.py"
